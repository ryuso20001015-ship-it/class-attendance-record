<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>授業出欠記録システム</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts (BIZ UDPGothic - ユニバーサルデザインフォント) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSSの設定を上書きし、デフォルトフォントをUDフォントにする -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"BIZ UDPGothic"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>

  <!-- Firebase (Compat版) -->
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

  <style>
    @media print {
      /* ★ 印刷レイアウト: A4縦(portrait)に変更、余白を狭くして広く使う */
      @page { size: A4 portrait; margin: 8mm; }
      body { background: white; }
      .print-hidden { display: none !important; }
      .print-expand { width: 100% !important; max-height: none !important; overflow: visible !important; border: none !important; box-shadow: none !important; }
      /* テーブルを自動縮小レイアウトに変更 */
      table { width: 100% !important; border-collapse: collapse; table-layout: auto !important; }
      .sticky { position: static !important; }
    }
    
    input, select, textarea, button {
      font-family: inherit;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">
  
  <div id="root">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'BIZ UDPGothic', sans-serif; color: #4b5563;">
      <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 1rem; color: #1e40af;"></i>
      <h2 style="font-weight: bold; margin-bottom: 0.5rem;">アプリを読み込んでいます...</h2>
      <p style="font-size: 0.875rem;">※しばらく待っても画面が変わらない場合は、インターネット接続をご確認ください。</p>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // エラーバウンダリ（画面が真っ白になるのを防ぐ）
    // ==========================================
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      componentDidCatch(error, errorInfo) {
        console.error("エラーを捕捉しました:", error, errorInfo);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="p-8 max-w-2xl mx-auto mt-10 bg-white border-t-4 border-red-500 rounded shadow">
              <h2 className="text-xl font-bold text-red-600 mb-4"><i className="fa-solid fa-triangle-exclamation"></i> 予期せぬエラーが発生しました</h2>
              <p className="text-sm text-gray-700 mb-4">
                端末内に保存されている古いデータと、新しいシステムの間に互換性の問題が発生している可能性があります。
              </p>
              <div className="bg-gray-100 p-4 rounded text-xs font-mono text-red-800 mb-6 overflow-auto">
                {this.state.error && this.state.error.toString()}
              </div>
              <button 
                onClick={() => {
                  if (window.confirm("端末内のデータを初期化して再読み込みします。よろしいですか？")) {
                    localStorage.removeItem('attendance_app_data');
                    window.location.reload();
                  }
                }}
                className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded font-bold flex items-center gap-2"
              >
                <i className="fa-solid fa-trash-can"></i> データを初期化して復旧する
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // ==========================================
    // ローカル環境向けの安全なストレージ操作
    // ==========================================
    const safeStorage = {
      get: (key) => {
        try { return localStorage.getItem(key); } 
        catch (e) { return null; }
      },
      set: (key, value) => {
        try { localStorage.setItem(key, value); } 
        catch (e) { }
      }
    };

    // ==========================================
    // Firebase Setup
    // ==========================================
    const firebaseConfig = {
      // apiKey: "AIzaSyDOCxxxxxxxxxxxxxxxxxxxxxxxxxxxxx",
    };

    let app, auth, db;
    const isFirebaseConfigured = firebaseConfig.apiKey && firebaseConfig.apiKey !== "";
    if (isFirebaseConfigured) {
      try {
        app = firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
      } catch (e) {
        console.error("Firebaseの初期化エラー:", e);
      }
    }

    // ==========================================
    // ユーティリティ・定数
    // ==========================================
    const STATUS_OPTIONS = [
      { label: "-", value: "", color: "bg-white text-gray-800" },
      { label: "欠席", value: "欠席", color: "bg-red-100 text-red-800 font-bold" },
      { label: "遅刻", value: "遅刻", color: "bg-yellow-100 text-yellow-800 font-bold" },
      { label: "早退", value: "早退", color: "bg-orange-100 text-orange-800" },
      { label: "保健室", value: "保健室", color: "bg-green-100 text-green-800" },
      { label: "他", value: "その他", color: "bg-gray-100 text-gray-800" },
    ];

    const getStatusConfig = (val) => STATUS_OPTIONS.find(opt => opt.value === val) || STATUS_OPTIONS[0];

    // ローカルタイムで現在の日付(YYYY-MM-DD)を取得する関数
    const getLocalDateString = () => {
      const d = new Date();
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const DEFAULT_DATA = {
      settings: { grades: { 1: 1, 2: 0, 3: 0 } },
      classes: [
        { 
          classId: "1-1", 
          className: "1年1組",
          students: [
            { id: "s1", number: 1, name: "山田 太郎", furigana: "やまだ たろう", gender: "男", status: "在籍" },
            { id: "s2", number: 2, name: "佐藤 花子", furigana: "さとう はなこ", gender: "女", status: "在籍" },
            { id: "s3", number: 3, name: "鈴木 一郎", furigana: "すずき いちろう", gender: "男", status: "在籍" },
          ] 
        }
      ],
      lessons: [
        { id: "l1", classId: "1-1", count: 1, date: getLocalDateString(), isLocked: false }
      ],
      attendances: {}
    };

    // ==========================================
    // メインコンポーネント
    // ==========================================
    function App() {
      const [activeTab, setActiveTab] = useState('attendance');
      const [appData, setAppData] = useState(DEFAULT_DATA);
      const [isLoaded, setIsLoaded] = useState(false);
      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
      const [user, setUser] = useState(null);

      const [past, setPast] = useState([]);
      const [future, setFuture] = useState([]);

      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 4000);
      };

      const handleSetAppData = (newData) => {
        setPast(prevPast => {
          const newPast = [...prevPast, appData];
          return newPast.length > 30 ? newPast.slice(newPast.length - 30) : newPast;
        });
        setFuture([]); 
        setAppData(newData);
      };

      const undo = () => {
        if (past.length === 0) return;
        const previous = past[past.length - 1];
        setPast(past.slice(0, past.length - 1));
        setFuture([appData, ...future]);
        setAppData(previous);
      };

      const redo = () => {
        if (future.length === 0) return;
        const next = future[0];
        setFuture(future.slice(1));
        setPast([...past, appData]);
        setAppData(next);
      };

      useEffect(() => {
        try {
          const saved = safeStorage.get('attendance_app_data');
          if (saved) {
            let parsed = JSON.parse(saved);
            
            if (parsed && parsed.classes) {
              if (!parsed.settings.grades) {
                parsed.settings.grades = {
                  1: parsed.settings.grade === 1 ? (parsed.settings.classCount || 1) : (parsed.classes.filter(c => c.classId.startsWith('1-')).length || 0),
                  2: parsed.settings.grade === 2 ? (parsed.settings.classCount || 1) : (parsed.classes.filter(c => c.classId.startsWith('2-')).length || 0),
                  3: parsed.settings.grade === 3 ? (parsed.settings.classCount || 1) : (parsed.classes.filter(c => c.classId.startsWith('3-')).length || 0),
                };
              }
              parsed.classes.forEach(c => {
                c.students.forEach(s => {
                  if (!s.status) s.status = "在籍";
                });
              });
              
              if (parsed.lessons) {
                parsed.lessons = parsed.lessons.map(l => ({
                  ...l,
                  isLocked: l.isLocked || false
                }));
              }
              
              setAppData(parsed);
            }
          }
        } catch (e) {
          console.error("データのパースに失敗しました", e);
        }
        setIsLoaded(true);
      }, []);

      useEffect(() => {
        if (isLoaded) {
          safeStorage.set('attendance_app_data', JSON.stringify(appData));
        }
      }, [appData, isLoaded]);

      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            await auth.signInAnonymously();
          } catch (e) {
            console.error("Firebase Auth Error", e);
          }
        };
        initAuth();
        const unsubscribe = auth.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      if (!isLoaded) return null;

      return (
        <div>
          <header className="bg-blue-800 text-white shadow-md print-hidden">
            <div className="container mx-auto px-4 py-2 flex flex-wrap justify-between items-center">
              <h1 className="text-xl font-bold flex items-center gap-2">
                <i className="fa-solid fa-pen"></i>
                授業出欠記録システム
              </h1>
              <div className="flex gap-2 mt-1 sm:mt-0 items-center">
                <div className="flex items-center gap-1 mr-1 pr-2 border-r border-blue-600 print-hidden">
                  <button 
                    onClick={undo} 
                    disabled={past.length === 0} 
                    className={`p-1.5 rounded transition-colors ${past.length === 0 ? 'text-blue-400/50 cursor-not-allowed' : 'text-white hover:bg-blue-700'}`} 
                    title="1つ元に戻す (Undo)"
                  >
                    <i className="fa-solid fa-rotate-left"></i>
                  </button>
                  <button 
                    onClick={redo} 
                    disabled={future.length === 0} 
                    className={`p-1.5 rounded transition-colors ${future.length === 0 ? 'text-blue-400/50 cursor-not-allowed' : 'text-white hover:bg-blue-700'}`} 
                    title="やり直す (Redo)"
                  >
                    <i className="fa-solid fa-rotate-right"></i>
                  </button>
                </div>

                <NavButton 
                  active={activeTab === 'attendance'} 
                  onClick={() => setActiveTab('attendance')} 
                  icon={<i className="fa-solid fa-pen"></i>} 
                  label="出欠記録" 
                />
                <NavButton 
                  active={activeTab === 'settings'} 
                  onClick={() => setActiveTab('settings')} 
                  icon={<i className="fa-solid fa-cog"></i>} 
                  label="生徒情報設定" 
                />
                <NavButton 
                  active={activeTab === 'sync'} 
                  onClick={() => setActiveTab('sync')} 
                  icon={<i className="fa-solid fa-sync-alt"></i>} 
                  label="データ同期" 
                />
              </div>
            </div>
          </header>

          {toast.show && (
            <div className={`fixed top-4 right-4 z-50 px-4 py-3 rounded shadow-lg flex items-center gap-2 transition-opacity ${
              toast.type === 'error' ? 'bg-red-500 text-white' : 
              toast.type === 'success' ? 'bg-green-500 text-white' : 'bg-blue-600 text-white'
            }`}>
              {toast.type === 'error' ? <i className="fa-solid fa-exclamation-circle"></i> : <i className="fa-solid fa-check-circle"></i>}
              {toast.message}
            </div>
          )}

          <main className="container mx-auto px-2 py-2 sm:px-4">
            {activeTab === 'attendance' && <AttendanceScreen appData={appData} setAppData={handleSetAppData} />}
            {activeTab === 'settings' && <SettingsScreen appData={appData} setAppData={handleSetAppData} showToast={showToast} />}
            {activeTab === 'sync' && <SyncScreen appData={appData} setAppData={handleSetAppData} showToast={showToast} user={user} />}
          </main>
        </div>
      );
    }

    function NavButton({ active, onClick, icon, label }) {
      return (
        <button
          onClick={onClick}
          className={`flex items-center gap-2 px-3 py-1.5 rounded text-sm font-medium transition-colors ${
            active ? 'bg-white text-blue-800 shadow' : 'text-blue-100 hover:bg-blue-700'
          }`}
        >
          {icon}
          <span className="hidden sm:inline">{label}</span>
        </button>
      );
    }

    // ==========================================
    // 1. 出欠記録画面
    // ==========================================
    function AttendanceScreen({ appData, setAppData }) {
      const gradesConfig = appData.settings?.grades || { 1: 1, 2: 0, 3: 0 };

      const visibleClasses = appData.classes.filter(c => {
        const [g, num] = c.classId.split('-');
        return parseInt(num) <= (gradesConfig[g] || 0);
      });

      const defaultClassId = visibleClasses.length > 0 ? visibleClasses[0].classId : "";
      const [currentClassId, setCurrentClassId] = useState(defaultClassId);
      const [memoModal, setMemoModal] = useState({ show: false, lessonId: null, studentId: null, text: '' });

      const [activeGradeTab, setActiveGradeTab] = useState(defaultClassId ? defaultClassId.split('-')[0] : "1");

      useEffect(() => {
        if (currentClassId) {
          setActiveGradeTab(currentClassId.split('-')[0]);
        }
      }, [currentClassId]);

      const safeClassId = visibleClasses.find(c => c.classId === currentClassId) ? currentClassId : defaultClassId;
      const currentClass = appData.classes.find(c => c.classId === safeClassId);
      const students = currentClass?.students || [];
      const lessons = appData.lessons.filter(l => l.classId === safeClassId).sort((a, b) => a.count - b.count);

      const addLesson = () => {
        if (!safeClassId) return;
        const nextCount = lessons.length > 0 ? Math.max(...lessons.map(l => l.count)) + 1 : 1;
        const newLesson = {
          id: `l_${Date.now()}`,
          classId: safeClassId,
          count: nextCount,
          date: getLocalDateString(),
          isLocked: false 
        };
        setAppData({ ...appData, lessons: [...appData.lessons, newLesson] });
      };

      const updateLessonDate = (lessonId, newDate) => {
        setAppData({
          ...appData,
          lessons: appData.lessons.map(l => l.id === lessonId ? { ...l, date: newDate } : l)
        });
      };

      const deleteLesson = (lessonId) => {
        if(window.confirm("この列を削除しますか？")){
          const targetLesson = appData.lessons.find(l => l.id === lessonId);
          if (!targetLesson) return;
          
          const remainingLessons = appData.lessons.filter(l => l.id !== lessonId);
          
          const targetClassLessons = remainingLessons
            .filter(l => l.classId === targetLesson.classId)
            .sort((a, b) => a.count - b.count);
            
          targetClassLessons.forEach((l, index) => {
            l.count = index + 1;
          });

          const updatedLessons = remainingLessons.map(l => {
            if (l.classId === targetLesson.classId) {
              return targetClassLessons.find(cl => cl.id === l.id) || l;
            }
            return l;
          });

          setAppData({
            ...appData,
            lessons: updatedLessons
          });
        }
      };

      const toggleLessonLock = (lessonId) => {
        setAppData({
          ...appData,
          lessons: appData.lessons.map(l => l.id === lessonId ? { ...l, isLocked: !l.isLocked } : l)
        });
      };

      const updateAttendance = (lessonId, studentId, status) => {
        const key = `${lessonId}_${studentId}`;
        setAppData({
          ...appData,
          attendances: {
            ...appData.attendances,
            [key]: { ...appData.attendances[key], status }
          }
        });
      };

      const saveMemo = () => {
        const key = `${memoModal.lessonId}_${memoModal.studentId}`;
        setAppData({
          ...appData,
          attendances: {
            ...appData.attendances,
            [key]: { ...appData.attendances[key], memo: memoModal.text }
          }
        });
        setMemoModal({ show: false, lessonId: null, studentId: null, text: '' });
      };

      const getAttendance = (lessonId, studentId) => {
        return appData.attendances[`${lessonId}_${studentId}`] || { status: "", memo: "" };
      };

      const countStatus = (studentId, statusToCount) => {
        return lessons.reduce((acc, lesson) => {
          const att = getAttendance(lesson.id, studentId);
          return acc + (att.status === statusToCount ? 1 : 0);
        }, 0);
      };

      const handlePrint = () => {
        window.print();
      };

      if (!currentClass) {
        return <div className="p-8 text-center text-gray-500">クラスが設定されていません。「クラス・名簿設定」から初期設定を行ってください。</div>;
      }

      return (
        <div className="bg-white rounded shadow p-2 sm:p-3 print-expand print:p-0 print:shadow-none">
          <div className="flex flex-wrap items-center justify-between mb-1 gap-2 print-hidden border-b pb-1">
            
            <div className="flex items-center gap-2 flex-wrap">
              <div className="flex gap-1 flex-wrap">
                {[1, 2, 3].map(g => {
                  const hasClasses = visibleClasses.some(c => c.classId.startsWith(`${g}-`));
                  if (!hasClasses) return null;
                  return (
                    <button
                      key={`grade-${g}`}
                      onClick={() => {
                        setActiveGradeTab(g.toString());
                        const firstClass = visibleClasses.find(c => c.classId.startsWith(`${g}-`));
                        if (firstClass) setCurrentClassId(firstClass.classId);
                      }}
                      className={`px-3 py-1.5 rounded text-sm font-bold transition-colors border ${
                        activeGradeTab === g.toString()
                          ? 'bg-blue-700 text-white border-blue-700 shadow'
                          : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100'
                      }`}
                    >
                      {g}年
                    </button>
                  );
                })}
              </div>

              <i className="fa-solid fa-angle-right text-gray-300 text-sm mx-1"></i>

              <div className="flex gap-1 flex-wrap">
                {visibleClasses.filter(c => c.classId.startsWith(`${activeGradeTab}-`)).map(c => (
                  <button
                    key={c.classId}
                    onClick={() => setCurrentClassId(c.classId)}
                    className={`px-3 py-1.5 rounded text-sm font-bold transition-colors border ${
                      safeClassId === c.classId
                        ? 'bg-blue-600 text-white border-blue-600 shadow'
                        : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100'
                    }`}
                  >
                    {c.className.replace(`${activeGradeTab}年`, '')}
                  </button>
                ))}
              </div>
            </div>

            <div className="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-end">
              <span className="text-xs text-gray-500 font-bold bg-gray-100 px-2 py-1 rounded">計 {students.length}名</span>
              <div className="flex gap-1">
                <button onClick={addLesson} className="flex items-center gap-1 bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded text-sm font-medium">
                  <i className="fa-solid fa-plus"></i> 授業追加
                </button>
                <button onClick={handlePrint} className="flex items-center gap-1 border border-gray-300 hover:bg-gray-100 text-gray-700 px-3 py-1.5 rounded text-sm font-medium">
                  <i className="fa-solid fa-print"></i> 印刷
                </button>
              </div>
            </div>
          </div>

          <h2 className="hidden print:block text-lg font-bold mb-2 text-center border-b pb-1">
            {currentClass.className} 出欠記録
          </h2>

          <div className="overflow-auto max-h-[calc(100vh-190px)] border border-gray-300 rounded bg-white print-expand relative print:border-none">
            <table className="w-max bg-white border-collapse text-sm">
              <thead className="bg-gray-100 sticky top-0 z-30 shadow-sm text-gray-700 print:bg-white">
                <tr>
                  <th className="sticky left-0 bg-gray-200 z-40 p-2 print:p-1 border border-gray-300 w-12 min-w-[3rem] print:w-auto print:min-w-0 print:text-[10px]">番号</th>
                  <th className="sticky left-12 bg-gray-200 z-40 p-2 print:p-1 border border-gray-300 w-32 min-w-[8rem] print:w-auto print:min-w-0 print:text-[10px]">氏名</th>
                  <th className="sticky left-[11rem] bg-gray-200 z-40 p-2 print:p-1 border border-gray-300 w-12 min-w-[3rem] print:w-auto print:min-w-0 print:text-[10px]">性別</th>
                  
                  {lessons.map(l => (
                    <th key={l.id} className="p-1 border border-gray-300 w-[120px] min-w-[120px] max-w-[120px] print:w-auto print:min-w-[24px] print:max-w-none bg-gray-50 print:bg-transparent overflow-hidden align-top">
                      <div className="flex flex-col gap-1 print:gap-0 text-center">
                        <input 
                          type="date" 
                          value={l.date} 
                          onChange={(e) => updateLessonDate(l.id, e.target.value)}
                          disabled={l.isLocked}
                          className={`w-full text-[10px] leading-tight border-none bg-transparent focus:ring-0 p-0 text-center font-normal print-hidden ${l.isLocked ? 'text-gray-400 cursor-not-allowed' : 'text-gray-600'}`}
                        />
                        <div className="hidden print:block text-[8px] text-center font-normal text-gray-800">
                          {l.date ? `${new Date(l.date).getMonth()+1}/${new Date(l.date).getDate()}` : ''}
                        </div>
                        <div className="flex justify-center items-center px-0.5 relative print:px-0 print:mt-0.5">
                          <span className={`font-bold text-[10px] px-1 py-0.5 rounded-full print:bg-transparent print:text-black print:p-0 print:text-[8px] ${l.isLocked ? 'bg-gray-200 text-gray-500' : 'bg-blue-100 text-blue-800'}`}>
                            {l.count}<span className="print-hidden">回</span>
                          </span>
                          {!l.isLocked && (
                            <button onClick={() => deleteLesson(l.id)} className="absolute right-0 text-gray-400 hover:text-red-500 print-hidden" title="この列を削除">
                              <i className="fa-solid fa-trash text-[10px]"></i>
                            </button>
                          )}
                        </div>
                        <div className="flex justify-center print-hidden mt-0.5">
                          <button 
                            onClick={() => toggleLessonLock(l.id)}
                            className={`text-[9px] w-[80%] py-[2px] rounded font-bold transition-colors flex items-center justify-center gap-1 border ${
                              l.isLocked 
                                ? 'bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border-emerald-200' 
                                : 'bg-white text-gray-500 hover:bg-gray-100 border-gray-300'
                            }`}
                          >
                            {l.isLocked ? <><i className="fa-solid fa-lock text-[8px]"></i>入力完了</> : <><i className="fa-solid fa-pen text-[8px]"></i>未入力</>}
                          </button>
                        </div>
                      </div>
                    </th>
                  ))}
                  
                  <th className="sticky right-[14rem] bg-red-50 z-40 p-2 print:p-1 border border-gray-300 w-14 min-w-[3.5rem] print:w-auto print:min-w-[20px] text-red-800 text-xs print:text-[8px] print:bg-transparent print:text-black">欠席</th>
                  <th className="sticky right-[10.5rem] bg-yellow-50 z-40 p-2 print:p-1 border border-gray-300 w-14 min-w-[3.5rem] print:w-auto print:min-w-[20px] text-yellow-800 text-xs print:text-[8px] print:bg-transparent print:text-black">遅刻</th>
                  <th className="sticky right-[7rem] bg-orange-50 z-40 p-2 print:p-1 border border-gray-300 w-14 min-w-[3.5rem] print:w-auto print:min-w-[20px] text-orange-800 text-xs print:text-[8px] print:bg-transparent print:text-black">早退</th>
                  <th className="sticky right-[3.5rem] bg-green-50 z-40 p-2 print:p-1 border border-gray-300 w-14 min-w-[3.5rem] print:w-auto print:min-w-[20px] text-green-800 text-xs print:text-[8px] print:bg-transparent print:text-black">保健室</th>
                  <th className="sticky right-0 bg-gray-100 z-40 p-2 print:p-1 border border-gray-300 w-14 min-w-[3.5rem] print:w-auto print:min-w-[20px] text-gray-600 text-xs print:text-[8px] print:bg-transparent print:text-black">他</th>
                </tr>
              </thead>
              <tbody>
                {students.length === 0 ? (
                  <tr><td colSpan={8 + lessons.length} className="p-4 text-center text-gray-500">生徒データがありません</td></tr>
                ) : students.map(s => {
                  const status = s.status || "在籍";
                  const isInactive = status === "転出" || status === "休学";
                  const rowBg = isInactive ? "bg-gray-100" : "bg-white";
                  const hoverBg = isInactive ? "group-hover:bg-gray-200" : "group-hover:bg-blue-50";

                  return (
                  <tr key={s.id} className={`group ${isInactive ? 'opacity-80' : ''}`}>
                    <td className={`sticky left-0 z-20 ${rowBg} border border-gray-300 p-2 print:p-1 text-center text-gray-500 font-medium print:text-[10px] print:text-black ${hoverBg}`}>{s.number}</td>
                    <td className={`sticky left-12 z-20 ${rowBg} border border-gray-300 p-2 print:p-1 ${hoverBg}`}>
                      <div className="flex items-center gap-1">
                        <div className={`font-bold whitespace-nowrap print:text-[10px] print:font-normal ${isInactive ? 'text-gray-500 line-through decoration-gray-400' : ''}`}>{s.name}</div>
                        {isInactive && <span className="text-[9px] font-bold bg-red-100 text-red-700 px-1 rounded whitespace-nowrap print:bg-transparent print:border print:border-gray-500 print:text-[8px]">{status}</span>}
                      </div>
                      <div className="text-[10px] text-gray-400 truncate print-hidden">{s.furigana}</div>
                    </td>
                    <td className={`sticky left-[11rem] z-20 ${rowBg} border border-gray-300 p-2 print:p-1 text-center text-xs print:text-[10px] text-gray-500 print:text-black ${hoverBg}`}>
                      {s.gender}
                    </td>
                    
                    {lessons.map(l => {
                      const att = getAttendance(l.id, s.id);
                      const conf = getStatusConfig(att.status);
                      
                      let cellBgColor = conf.color;
                      if (isInactive) {
                        cellBgColor = `${rowBg} text-gray-400`;
                      } else if (l.isLocked && cellBgColor.includes('bg-')) {
                        cellBgColor = cellBgColor.replace('bg-', 'bg-opacity-50 bg-');
                      }

                      return (
                        <td key={l.id} className={`border border-gray-300 p-0 relative w-[120px] min-w-[120px] max-w-[120px] print:w-auto print:min-w-[24px] print:max-w-none align-top ${cellBgColor} print:bg-transparent`}>
                          <div className="flex flex-col h-full w-full min-h-[46px] print:min-h-[20px] print:justify-center">
                            <div className="w-full">
                              <select
                                value={att.status}
                                onChange={(e) => updateAttendance(l.id, s.id, e.target.value)}
                                disabled={l.isLocked}
                                className={`w-full appearance-none bg-transparent border-none focus:ring-0 text-center text-xs font-bold cursor-pointer pt-1.5 pb-0.5 px-1 print:p-0 print:text-[9px] print:text-black ${isInactive ? 'text-gray-400' : (att.status ? '' : 'text-gray-300')} ${l.isLocked ? 'cursor-not-allowed opacity-60 print:opacity-100' : ''}`}
                              >
                                {STATUS_OPTIONS.map(opt => (
                                  <option key={opt.value} value={opt.value} className="text-gray-800 bg-white">{opt.label}</option>
                                ))}
                              </select>
                            </div>
                            
                            <div className="flex items-center justify-between px-1 pb-1 w-full mt-auto gap-1 print-hidden">
                              <div 
                                className={`text-[10px] flex-1 truncate text-left ${l.isLocked || isInactive ? 'text-gray-400 cursor-not-allowed' : 'text-gray-600 cursor-pointer'}`}
                                onClick={() => !l.isLocked && att.memo && setMemoModal({ show: true, lessonId: l.id, studentId: s.id, text: att.memo })}
                                title={l.isLocked ? `メモ: ${att.memo} (保護中)` : att.memo}
                              >
                                {att.memo || '\u00A0'}
                              </div>
                              
                              <button 
                                onClick={() => !l.isLocked && setMemoModal({ show: true, lessonId: l.id, studentId: s.id, text: att.memo || '' })}
                                disabled={l.isLocked}
                                className={`shrink-0 p-1 rounded-full print-hidden leading-none ${att.memo ? (isInactive ? 'text-blue-400' : 'text-blue-600') : 'text-gray-300 hover:text-gray-500 hover:bg-black/5'} ${l.isLocked ? 'cursor-not-allowed opacity-50' : ''}`}
                                title={l.isLocked ? (att.memo ? `メモ: ${att.memo} (保護中)` : "保護中のため編集不可") : (att.memo ? "メモを編集" : "メモを追加")}
                              >
                                <i className="fa-solid fa-comment-dots text-[11px]"></i>
                              </button>
                            </div>
                          </div>
                        </td>
                      );
                    })}
                    
                    <td className={`sticky right-[14rem] z-20 ${rowBg} border border-gray-300 p-2 print:p-1 text-center font-bold ${isInactive ? 'text-gray-400' : 'text-red-600'} print:text-black print:text-[10px] ${hoverBg}`}>{countStatus(s.id, '欠席') || ''}</td>
                    <td className={`sticky right-[10.5rem] z-20 ${rowBg} border border-gray-300 p-2 print:p-1 text-center font-bold ${isInactive ? 'text-gray-400' : 'text-yellow-600'} print:text-black print:text-[10px] ${hoverBg}`}>{countStatus(s.id, '遅刻') || ''}</td>
                    <td className={`sticky right-[7rem] z-20 ${rowBg} border border-gray-300 p-2 print:p-1 text-center font-bold ${isInactive ? 'text-gray-400' : 'text-orange-600'} print:text-black print:text-[10px] ${hoverBg}`}>{countStatus(s.id, '早退') || ''}</td>
                    <td className={`sticky right-[3.5rem] z-20 ${rowBg} border border-gray-300 p-2 print:p-1 text-center font-bold ${isInactive ? 'text-gray-400' : 'text-green-600'} print:text-black print:text-[10px] ${hoverBg}`}>{countStatus(s.id, '保健室') || ''}</td>
                    <td className={`sticky right-0 z-20 ${rowBg} border border-gray-300 p-2 print:p-1 text-center font-bold ${isInactive ? 'text-gray-400' : 'text-gray-500'} print:text-black print:text-[10px] ${hoverBg}`}>{countStatus(s.id, 'その他') || ''}</td>
                  </tr>
                )})}
              </tbody>
            </table>
          </div>

          {memoModal.show && (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 print-hidden">
              <div className="bg-white rounded-lg shadow-xl w-full max-w-sm overflow-hidden">
                <div className="bg-blue-800 text-white px-4 py-3 font-bold">メモの編集</div>
                <div className="p-4">
                  <p className="text-sm text-gray-600 mb-2">
                    {currentClass.students.find(s => s.id === memoModal.studentId)?.name} さんの記録
                  </p>
                  <textarea
                    autoFocus
                    value={memoModal.text}
                    onChange={(e) => setMemoModal({ ...memoModal, text: e.target.value })}
                    className="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 h-24"
                    placeholder="遅刻の理由、保健室での様子など..."
                  />
                </div>
                <div className="bg-gray-50 px-4 py-3 flex justify-end gap-2 border-t">
                  <button onClick={() => setMemoModal({ ...memoModal, show: false })} className="px-4 py-2 rounded border hover:bg-gray-100 text-sm">キャンセル</button>
                  <button onClick={saveMemo} className="px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold flex items-center gap-1">
                    <i className="fa-solid fa-save"></i> 保存
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 2. クラス・名簿設定画面
    // ==========================================
    function SettingsScreen({ appData, setAppData, showToast }) {
      const initialGrades = appData.settings?.grades || {
        1: appData.settings?.grade === 1 ? (appData.settings.classCount || 1) : (appData.classes.filter(c => c.classId.startsWith('1-')).length || 0),
        2: appData.settings?.grade === 2 ? (appData.settings.classCount || 1) : (appData.classes.filter(c => c.classId.startsWith('2-')).length || 0),
        3: appData.settings?.grade === 3 ? (appData.settings.classCount || 1) : (appData.classes.filter(c => c.classId.startsWith('3-')).length || 0),
      };
      
      const [gradesConfig, setGradesConfig] = useState(initialGrades);
      const [activeEditClassId, setActiveEditClassId] = useState(appData.classes[0]?.classId || null);
      const [activeGradeTab, setActiveGradeTab] = useState(activeEditClassId ? activeEditClassId.split('-')[0] : "1");
      
      // ★ バルクインポート（一括追加）用の状態
      const [bulkImport, setBulkImport] = useState({ show: false, classId: null, text: '' });

      useEffect(() => {
        if (activeEditClassId) {
          setActiveGradeTab(activeEditClassId.split('-')[0]);
        }
      }, [activeEditClassId]);

      const handleConfigChange = (grade, value) => {
        setGradesConfig({ ...gradesConfig, [grade]: Number(value) });
      };

      const applySettings = () => {
        let updatedClasses = [...appData.classes];
        
        [1, 2, 3].forEach(g => {
          const count = gradesConfig[g] || 0;
          for (let c = 1; c <= count; c++) {
            const classId = `${g}-${c}`;
            if (!updatedClasses.find(cls => cls.classId === classId)) {
              updatedClasses.push({
                classId: classId,
                className: `${g}年${c}組`,
                students: []
              });
            }
          }
        });
        
        const hasVisibleClass = updatedClasses.some(c => {
          const [g, num] = c.classId.split('-');
          return parseInt(num) <= (gradesConfig[g] || 0);
        });

        if (!hasVisibleClass) {
          showToast("最低でも1つのクラスが表示されるよう設定してください", "error");
          return;
        }

        setAppData({
          ...appData,
          settings: { ...appData.settings, grades: gradesConfig },
          classes: updatedClasses
        });

        const [activeG, activeNum] = (activeEditClassId || "1-1").split('-');
        if (parseInt(activeNum) > (gradesConfig[activeG] || 0)) {
           const firstVisible = updatedClasses.find(c => {
             const [g, num] = c.classId.split('-');
             return parseInt(num) <= (gradesConfig[g] || 0);
           });
           setActiveEditClassId(firstVisible?.classId || null);
        }

        showToast("クラス構成を更新しました。（※減らしたクラスのデータも裏側で保護されています）", "success");
      };

      const handleStudentChange = (classId, studentId, field, value) => {
        setAppData({
          ...appData,
          classes: appData.classes.map(c => {
            if (c.classId !== classId) return c;
            return {
              ...c,
              students: c.students.map(s => s.id === studentId ? { ...s, [field]: value } : s)
            };
          })
        });
      };

      const addStudent = (classId) => {
        setAppData({
          ...appData,
          classes: appData.classes.map(c => {
            if (c.classId !== classId) return c;
            const nextNum = c.students.length > 0 ? Math.max(...c.students.map(s => s.number)) + 1 : 1;
            return {
              ...c,
              students: [...c.students, { id: `s_${Date.now()}`, number: nextNum, name: "", furigana: "", gender: "男", status: "在籍" }]
            };
          })
        });
      };

      const removeStudent = (classId, studentId) => {
        if(!window.confirm("【警告】\nこの生徒を完全に削除すると、過去の出欠データも全て消去されてしまいます。\n\n※年度途中の転出等の場合は、削除せずに左の「状態」を「転出」に変更することをお勧めします。\n\n本当に完全に削除してよろしいですか？")) return;
        setAppData({
          ...appData,
          classes: appData.classes.map(c => {
            if (c.classId !== classId) return c;
            return {
              ...c,
              students: c.students.filter(s => s.id !== studentId)
            };
          })
        });
      };

      // ★ バルクインポート（コピペで一括追加）の処理ロジック
      const processBulkImport = () => {
        const { classId, text } = bulkImport;
        if (!text.trim()) {
          setBulkImport({ ...bulkImport, show: false });
          return;
        }

        const lines = text.split('\n').filter(line => line.trim() !== '');
        const newStudents = [];
        
        const targetClass = appData.classes.find(c => c.classId === classId);
        let currentMaxNumber = targetClass.students.length > 0 ? Math.max(...targetClass.students.map(s => s.number)) : 0;

        lines.forEach((line, index) => {
          const cols = line.split(/[\t,]/).map(c => c.trim().replace(/^"|"$/g, '')); // タブまたはカンマ区切り（Excelからのコピペはタブ区切り）
          if (cols.length === 0 || !cols[0]) return;

          let number = currentMaxNumber + 1;
          let name = "";
          let furigana = "";
          let gender = "その他"; // デフォルトを「その他」に変更

          if (cols.length > 0) {
            const firstIsNum = !isNaN(parseInt(cols[0]));
            if (firstIsNum) {
              // 1列目が数字の場合 (例: 1, 山田 太郎, やまだ たろう, 男)
              number = parseInt(cols[0]);
              name = cols[1] || "";
              furigana = cols[2] || "";
              gender = cols[3] || "その他";
            } else {
              // 1列目が名前の場合 (例: 山田 太郎, やまだ たろう, 男)
              name = cols[0];
              furigana = cols[1] || "";
              gender = cols[2] || "その他";
            }
            if(!["男", "女", "その他"].includes(gender)) gender = "その他";
          }

          currentMaxNumber = number;

          newStudents.push({
            id: `s_bulk_${Date.now()}_${index}`,
            number,
            name,
            furigana,
            gender,
            status: "在籍"
          });
        });

        if (newStudents.length > 0) {
          setAppData({
            ...appData,
            classes: appData.classes.map(c => {
              if (c.classId !== classId) return c;
              return {
                ...c,
                students: [...c.students, ...newStudents]
              };
            })
          });
          showToast(`${newStudents.length}名の生徒を一括追加しました`, "success");
        }
        
        setBulkImport({ show: false, classId: null, text: '' });
      };

      const visibleClasses = appData.classes.filter(c => {
        const [g, num] = c.classId.split('-');
        return parseInt(num) <= (appData.settings.grades[g] || 0);
      });

      const activeClass = appData.classes.find(c => c.classId === activeEditClassId);

      return (
        <div className="space-y-6 max-w-4xl mx-auto">
          <div className="bg-white p-6 rounded shadow border-t-4 border-blue-800">
            
            <div className="flex flex-wrap items-center justify-center gap-6 mb-6 pb-6 border-b border-gray-200">
              <div className="flex flex-wrap justify-center gap-6">
                {[1, 2, 3].map(g => (
                  <div key={g} className="flex items-center gap-2">
                    <label className="text-sm font-bold text-gray-700 whitespace-nowrap">{g}年生</label>
                    <div className="flex items-center gap-1">
                      <select 
                        value={gradesConfig[g]} 
                        onChange={e => handleConfigChange(g, e.target.value)} 
                        className="border p-1.5 rounded w-16 text-center focus:ring-2 focus:ring-blue-500 bg-white cursor-pointer" 
                      >
                        {[...Array(16).keys()].map(num => (
                          <option key={num} value={num}>{num}</option>
                        ))}
                      </select>
                      <span className="text-sm text-gray-500 whitespace-nowrap">クラス</span>
                    </div>
                  </div>
                ))}
              </div>
              <button onClick={applySettings} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-bold transition-colors shadow whitespace-nowrap">
                設定を適用する
              </button>
            </div>

            {visibleClasses.length > 0 && (
              <div>
                <div className="flex flex-wrap items-center gap-2 mb-4 border-b pb-2">
                  <div className="flex gap-1 flex-wrap">
                    {[1, 2, 3].map(g => {
                      const hasClasses = visibleClasses.some(c => c.classId.startsWith(`${g}-`));
                      if (!hasClasses) return null;
                      return (
                        <button
                          key={`grade-${g}`}
                          onClick={() => {
                            setActiveGradeTab(g.toString());
                            const firstClass = visibleClasses.find(c => c.classId.startsWith(`${g}-`));
                            if (firstClass) setActiveEditClassId(firstClass.classId);
                          }}
                          className={`px-3 py-1.5 rounded text-sm font-bold transition-colors border ${
                            activeGradeTab === g.toString()
                              ? 'bg-blue-700 text-white border-blue-700 shadow'
                              : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100'
                          }`}
                        >
                          {g}年
                        </button>
                      );
                    })}
                  </div>

                  <i className="fa-solid fa-angle-right text-gray-300 text-sm mx-1"></i>

                  <div className="flex gap-1 flex-wrap">
                    {visibleClasses.filter(c => c.classId.startsWith(`${activeGradeTab}-`)).map(c => (
                      <button
                        key={c.classId}
                        onClick={() => setActiveEditClassId(c.classId)}
                        className={`px-3 py-1.5 rounded text-sm font-bold transition-colors border ${
                          activeEditClassId === c.classId
                            ? 'bg-blue-600 text-white border-blue-600 shadow'
                            : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100'
                        }`}
                      >
                        {c.className.replace(`${activeGradeTab}年`, '')}
                      </button>
                    ))}
                  </div>
                </div>

                {activeClass && (
                  <div>
                    <div className="flex flex-wrap justify-between items-center mb-2 gap-2">
                      <span className="text-sm font-bold text-gray-600">{activeClass.className} の生徒一覧 ({activeClass.students.length}名)</span>
                      <div className="flex gap-2">
                        <button 
                          onClick={() => setBulkImport({ show: true, classId: activeClass.classId, text: '' })} 
                          className="flex items-center gap-2 text-sm bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded transition-colors"
                        >
                          <i className="fa-solid fa-file-import"></i> 一括追加
                        </button>
                        <button onClick={() => addStudent(activeClass.classId)} className="flex items-center gap-2 text-sm bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded transition-colors">
                          <i className="fa-solid fa-plus"></i> 1名追加
                        </button>
                      </div>
                    </div>
                    
                    <div className="overflow-x-auto border rounded">
                      <table className="min-w-full text-sm">
                        <thead className="bg-gray-100">
                          <tr>
                            <th className="p-2 border-b w-16">番号</th>
                            <th className="p-2 border-b">名前</th>
                            <th className="p-2 border-b">ふりがな</th>
                            <th className="p-2 border-b w-20">性別</th>
                            <th className="p-2 border-b w-24">状態</th>
                            <th className="p-2 border-b w-16">削除</th>
                          </tr>
                        </thead>
                        <tbody>
                          {activeClass.students.map((s, index) => (
                            <tr key={s.id} className="hover:bg-gray-50">
                              <td className="p-1 border-b text-center">
                                <input 
                                  type="number" value={s.number} 
                                  onChange={(e) => handleStudentChange(activeClass.classId, s.id, 'number', Number(e.target.value))}
                                  className="w-full p-1 border rounded text-center focus:ring-2 focus:ring-blue-500"
                                />
                              </td>
                              <td className="p-1 border-b">
                                <input 
                                  type="text" value={s.name} placeholder="例: 山田 太郎"
                                  onChange={(e) => handleStudentChange(activeClass.classId, s.id, 'name', e.target.value)}
                                  className={`w-full p-1 border rounded focus:ring-2 focus:ring-blue-500 ${s.status === '転出' || s.status === '休学' ? 'text-gray-400 bg-gray-50' : ''}`}
                                />
                              </td>
                              <td className="p-1 border-b">
                                <input 
                                  type="text" value={s.furigana} placeholder="例: やまだ たろう"
                                  onChange={(e) => handleStudentChange(activeClass.classId, s.id, 'furigana', e.target.value)}
                                  className="w-full p-1 border rounded focus:ring-2 focus:ring-blue-500"
                                />
                              </td>
                              <td className="p-1 border-b">
                                <select 
                                  value={s.gender} 
                                  onChange={(e) => handleStudentChange(activeClass.classId, s.id, 'gender', e.target.value)}
                                  className="w-full p-1 border rounded focus:ring-2 focus:ring-blue-500"
                                >
                                  <option value="男">男</option>
                                  <option value="女">女</option>
                                  <option value="その他">その他</option>
                                </select>
                              </td>
                              <td className="p-1 border-b">
                                <select 
                                  value={s.status || "在籍"} 
                                  onChange={(e) => handleStudentChange(activeClass.classId, s.id, 'status', e.target.value)}
                                  className={`w-full p-1 border rounded font-bold focus:ring-2 focus:ring-blue-500 ${s.status === '転出' || s.status === '休学' ? 'bg-red-50 text-red-700 border-red-200' : 'bg-green-50 text-green-700 border-green-200'}`}
                                >
                                  <option value="在籍">在籍</option>
                                  <option value="転出">転出</option>
                                  <option value="休学">休学</option>
                                </select>
                              </td>
                              <td className="p-1 border-b text-center">
                                <button onClick={() => removeStudent(activeClass.classId, s.id)} className="p-2 text-red-500 hover:bg-red-50 rounded transition-colors" title="削除（非推奨）">
                                  <i className="fa-solid fa-trash"></i>
                                </button>
                              </td>
                            </tr>
                          ))}
                          {activeClass.students.length === 0 && (
                            <tr><td colSpan={6} className="p-8 text-center text-gray-500">生徒を追加してください</td></tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* ★ 要望3: 一括追加（コピペ）用のモーダルUI */}
          {bulkImport.show && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-lg shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                <div className="bg-indigo-800 text-white px-4 py-3 font-bold flex justify-between items-center">
                  <span><i className="fa-solid fa-file-import mr-2"></i>名簿データの一括追加</span>
                  <button onClick={() => setBulkImport({ show: false, classId: null, text: '' })} className="text-white hover:text-gray-300">
                    <i className="fa-solid fa-times text-lg"></i>
                  </button>
                </div>
                <div className="p-4 overflow-y-auto">
                  <div className="bg-blue-50 border border-blue-200 text-blue-800 text-sm p-3 rounded mb-4">
                    <p className="font-bold mb-1">💡 Excelやスプレッドシートからコピー＆ペーストできます</p>
                    <ul className="list-disc pl-5 space-y-1 text-xs">
                      <li>以下の形式で、表計算ソフトからセルをコピーして下の枠に貼り付けてください。</li>
                      <li>形式: <strong>「出席番号」 「氏名」 「ふりがな」 「性別」</strong> の順（列がない場合は空欄や詰められていても自動判別を試みます）</li>
                      <li>出席番号が省略された場合は、現在の最大番号から自動で連番が振られます。</li>
                    </ul>
                  </div>
                  <textarea
                    autoFocus
                    value={bulkImport.text}
                    onChange={(e) => setBulkImport({ ...bulkImport, text: e.target.value })}
                    className="w-full border border-gray-300 rounded p-3 text-sm font-mono whitespace-pre focus:ring-2 focus:ring-indigo-500 h-64"
                    placeholder="ここにExcelのセルを貼り付けてください...&#10;&#10;例:&#10;1&#9;山田 太郎&#9;やまだ たろう&#9;男&#10;2&#9;佐藤 花子&#9;さとう はなこ&#9;女&#10;3&#9;鈴木 一郎&#9;&#9;男"
                  />
                </div>
                <div className="bg-gray-50 px-4 py-3 flex justify-end gap-2 border-t">
                  <button onClick={() => setBulkImport({ show: false, classId: null, text: '' })} className="px-4 py-2 rounded border hover:bg-gray-100 text-sm font-medium">
                    キャンセル
                  </button>
                  <button onClick={processBulkImport} className="px-4 py-2 rounded bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold flex items-center gap-2">
                    <i className="fa-solid fa-check"></i> この内容で追加する
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 3. データ同期・管理画面
    // ==========================================
    function SyncScreen({ appData, setAppData, showToast, user }) {
      const [syncCode, setSyncCode] = useState('');
      const [importText, setImportText] = useState('');
      const [isCloudLoading, setIsCloudLoading] = useState(false);

      const handleCopyExport = () => {
        const text = JSON.stringify(appData, null, 2);
        try {
          if (navigator.clipboard) {
             navigator.clipboard.writeText(text);
          } else {
             const textArea = document.createElement("textarea");
             textArea.value = text;
             document.body.appendChild(textArea);
             textArea.select();
             document.execCommand('copy');
             document.body.removeChild(textArea);
          }
          showToast("データをコピーしました。メモ帳等に貼り付けて保存してください。", "success");
        } catch (err) {
          showToast("コピーに失敗しました", "error");
        }
      };

      const handleImportJson = () => {
        if (!importText.trim()) {
          showToast("テキストが入力されていません", "error");
          return;
        }
        try {
          const parsed = JSON.parse(importText);
          if (!parsed.classes || !parsed.settings) throw new Error("不正なデータフォーマットです");
          if (window.confirm("現在のデータは失われ、入力したデータで上書きされます。よろしいですか？")) {
            setAppData(parsed);
            setImportText('');
            showToast("データを復元しました", "success");
          }
        } catch (e) {
          showToast("正しい形式のデータではありません", "error");
        }
      };

      const handleCloudUpload = async () => {
        if (!db || !user) {
          showToast("Firebaseが設定されていないか、未接続です", "error");
          return;
        }
        if (!syncCode || syncCode.length < 4) {
          showToast("4桁以上の同期コードを入力してください", "error");
          return;
        }
        
        setIsCloudLoading(true);
        try {
          await db.collection('attendance_sync').doc(syncCode).set({ 
            data: JSON.stringify(appData),
            updatedAt: new Date().toISOString() 
          });
          showToast(`クラウドへ保存しました (コード: ${syncCode})`, "success");
        } catch (e) {
          console.error(e);
          showToast("アップロードに失敗しました。Firebaseのルール設定等を確認してください。", "error");
        } finally {
          setIsCloudLoading(false);
        }
      };

      const handleCloudDownload = async () => {
        if (!db || !user) {
          showToast("Firebaseが設定されていないか、未接続です", "error");
          return;
        }
        if (!syncCode || syncCode.length < 4) {
          showToast("4桁以上の同期コードを入力してください", "error");
          return;
        }

        setIsCloudLoading(true);
        try {
          const docSnap = await db.collection('attendance_sync').doc(syncCode).get();
          
          if (docSnap.exists) {
            const cloudData = docSnap.data();
            if (window.confirm("クラウドのデータで現在の状態を上書きします。よろしいですか？")) {
              setAppData(JSON.parse(cloudData.data));
              showToast("クラウドから復元しました", "success");
            }
          } else {
            showToast("指定された同期コードのデータが見つかりません", "error");
          }
        } catch (e) {
          console.error(e);
          showToast("ダウンロードに失敗しました", "error");
        } finally {
          setIsCloudLoading(false);
        }
      };

      const clearLocalData = () => {
        if (window.confirm("すべてのデータを消去して初期状態に戻します。元には戻せません。よろしいですか？")) {
          setAppData(DEFAULT_DATA);
          showToast("データを初期化しました", "success");
        }
      };

      return (
        <div className="max-w-4xl mx-auto space-y-6">
          <div className="bg-white p-6 rounded shadow border-t-4 border-blue-500">
            <h2 className="text-lg font-bold mb-2 flex items-center gap-2">
              <i className="fa-solid fa-cloud text-blue-500"></i>
              クラウド同期（リアルタイム共有）
            </h2>
            <p className="text-sm text-gray-600 mb-4">
              職員室のPCや教室のタブレットなど、複数端末でデータを共有するための機能です。
              <br/>お好きな「同期コード」を決めて入力してください。
            </p>
            
            <div className="flex flex-col sm:flex-row gap-4 items-end bg-blue-50 p-4 rounded-lg border border-blue-100">
              <div className="flex-1 w-full">
                <label className="block text-sm font-bold text-gray-700 mb-1">同期コード (合言葉)</label>
                <input 
                  type="text" 
                  value={syncCode} 
                  onChange={e => setSyncCode(e.target.value)} 
                  placeholder="例: class1234"
                  className="w-full border p-2 rounded text-lg font-mono tracking-widest focus:ring-2 focus:ring-blue-500"
                />
              </div>
              <div className="flex gap-2 w-full sm:w-auto">
                <button 
                  onClick={handleCloudUpload} 
                  disabled={isCloudLoading}
                  className="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white px-6 py-2 rounded font-bold transition-colors"
                >
                  <i className="fa-solid fa-cloud-upload-alt"></i> アップロード
                </button>
                <button 
                  onClick={handleCloudDownload} 
                  disabled={isCloudLoading}
                  className="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-300 text-white px-6 py-2 rounded font-bold transition-colors"
                >
                  <i className="fa-solid fa-cloud-download-alt"></i> 読み込み
                </button>
              </div>
            </div>
            {!isFirebaseConfigured && (
               <p className="text-xs text-red-500 mt-2 font-bold"><i className="fa-solid fa-exclamation-triangle"></i> 現在Firebaseが設定されていないため、クラウド機能は利用できません。HTMLソース内の設定を書き換えてください。</p>
            )}
          </div>

          <div className="bg-white p-6 rounded shadow">
            <h2 className="text-lg font-bold mb-4 flex items-center gap-2"><i className="fa-solid fa-file-export"></i> 手動データ引き継ぎ（バックアップ・復元）</h2>
            
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {/* 出力（エクスポート） */}
              <div className="border border-gray-200 rounded-lg p-5 bg-gray-50 flex flex-col">
                <h3 className="font-bold text-gray-800 mb-2 border-b pb-2 flex items-center gap-2">
                  <i className="fa-solid fa-arrow-right-from-bracket text-blue-600"></i>
                  データを出力する（バックアップ）
                </h3>
                <p className="text-sm text-gray-600 mb-4 flex-1">
                  現在のアプリのデータを専用の文字列に変換してコピーします。<br/>
                  コピーした文字列は、メモ帳やメールアプリなどに貼り付けて保存・移動してください。
                </p>
                <button 
                  onClick={handleCopyExport} 
                  className="w-full flex justify-center items-center gap-2 bg-white border-2 border-blue-600 text-blue-600 hover:bg-blue-50 px-4 py-3 rounded font-bold transition-colors"
                >
                  <i className="fa-solid fa-copy"></i> 現在のデータをコピーする
                </button>
              </div>

              {/* 入力（インポート） */}
              <div className="border border-gray-200 rounded-lg p-5 bg-gray-50 flex flex-col">
                <h3 className="font-bold text-gray-800 mb-2 border-b pb-2 flex items-center gap-2">
                  <i className="fa-solid fa-arrow-right-to-bracket text-green-600"></i>
                  データを取り込む（復元）
                </h3>
                <p className="text-sm text-gray-600 mb-2">
                  コピーしておいた文字列を下の枠に貼り付けて、データを復元します。<br/>
                  <span className="text-red-500 font-bold text-xs">※現在のデータは上書きされ消去されます。</span>
                </p>
                
                <textarea 
                  value={importText}
                  onChange={e => setImportText(e.target.value)}
                  placeholder="ここにコピーした文字列を貼り付けてください..."
                  className="w-full h-24 border border-gray-300 rounded p-2 text-xs font-mono bg-white mb-3 focus:ring-2 focus:ring-green-500"
                />
                
                <button 
                  onClick={handleImportJson} 
                  className="w-full flex justify-center items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded font-bold transition-colors mt-auto"
                >
                  <i className="fa-solid fa-download"></i> 貼り付けたデータで復元する
                </button>
              </div>
            </div>
          </div>

          <div className="border border-red-200 bg-red-50 p-6 rounded shadow mt-10">
            <h3 className="text-red-800 font-bold flex items-center gap-2 mb-2"><i className="fa-solid fa-exclamation-circle"></i> 危険な操作</h3>
            <p className="text-sm text-red-600 mb-4">アプリ内のデータをすべて消去して初期状態に戻します。元には戻せません。</p>
            <button onClick={clearLocalData} className="bg-white border border-red-500 text-red-600 hover:bg-red-50 px-4 py-2 rounded text-sm font-bold flex items-center gap-2">
              <i className="fa-solid fa-trash"></i> データを全消去する
            </button>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    // ErrorBoundaryでApp全体を囲む
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
